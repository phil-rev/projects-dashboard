<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magazine Flat Plan</title>
<style>
  :root{
    --ink:#1a1a1a; --muted:#6a6a6a; --line:#c7c7c7; --line2:#e4e4e4;
    --teal:#1f8f95; --special:#e8998a; --zone-line:#b9b9b9;
    --tw:88px; --th:118px;   /* tile size (display setting) */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#fff;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;}
  .app{display:flex;flex-direction:column;min-height:100vh;}

  .topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--line2);flex-wrap:wrap;}
  .brand{font-weight:800;color:var(--teal);font-size:18px;letter-spacing:-.02em;}
  .issue-select select{font-size:14px;font-weight:600;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;max-width:320px;}
  .badge-arch{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9a6a00;background:#fff3d6;border:1px solid #f0d488;border-radius:4px;padding:2px 6px;}
  .spacer{flex:1;}
  .tbtn{font-size:12.5px;background:#fff;border:1px solid var(--line);color:#333;padding:7px 11px;border-radius:6px;cursor:pointer;white-space:nowrap;}
  .tbtn:hover{border-color:#999;color:#000;}
  .tbtn.primary{background:var(--teal);color:#fff;border-color:var(--teal);}
  .tbtn.primary:hover{background:#187478;}

  .toolbar{display:flex;align-items:center;gap:14px;padding:9px 16px;border-bottom:1px solid var(--line2);flex-wrap:wrap;}
  h1.title{font-size:16px;font-weight:700;margin:0;color:#000;}
  .cats{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12px;color:#333;}
  .cats .c{display:flex;align-items:center;gap:5px;}
  .cats .dotc{width:11px;height:11px;border-radius:2px;display:inline-block;border:1px solid rgba(0,0,0,.15);}
  .stat{font-size:12.5px;color:#333;} .stat b{color:#000;}

  .board-wrap{padding:16px;overflow:auto;flex:1;}
  .board{display:flex;flex-wrap:wrap;align-items:flex-start;gap:16px 12px;}
  .spread{display:flex;gap:0;}
  .page{display:flex;flex-direction:column;width:var(--tw);}

  .tile{position:relative;width:var(--tw);height:var(--th);border:1.5px solid var(--line);background:#fff;cursor:pointer;overflow:hidden;transition:box-shadow .1s,transform .1s;}
  .tile:hover{box-shadow:0 3px 12px rgba(0,0,0,.18);transform:translateY(-1px);z-index:3;}
  .tile.special{border:2px solid var(--special);}
  .tile.locked{cursor:not-allowed;}
  .tile.dragging{opacity:.35;}
  .tile.dragover{outline:2px dashed var(--teal);outline-offset:-2px;}
  .zone{position:absolute;border:.5px solid var(--zone-line);display:flex;align-items:center;justify-content:center;text-align:center;padding:2px;overflow:hidden;}
  .zone .zt{font-size:7.5px;line-height:1.1;font-weight:600;color:#222;word-break:break-word;max-height:100%;overflow:hidden;}
  .zone.advert{background:repeating-linear-gradient(45deg,#eee,#eee 3px,#d7d7d7 3px,#d7d7d7 6px);}
  .zone.advert .zt{color:#444;background:rgba(255,255,255,.72);padding:0 2px;border-radius:2px;}
  .zone.catbar{border-left-width:3px;}
  .lockicon,.noteicon{position:absolute;font-size:9px;z-index:2;}
  .lockicon{top:2px;right:3px;color:#888;} .noteicon{bottom:2px;right:3px;color:var(--teal);}
  .overlay-badge{position:absolute;bottom:2px;left:3px;font-size:8px;font-weight:700;color:#fff;background:rgba(31,143,149,.9);border-radius:3px;padding:0 3px;z-index:2;}
  .caption{display:flex;justify-content:center;font-size:11px;color:#222;padding:3px 1px 0;min-height:15px;font-weight:600;}
  .pagemenu{position:absolute;top:1px;right:2px;font-size:12px;color:#999;cursor:pointer;line-height:1;padding:1px 3px;z-index:2;border-radius:3px;}
  .pagemenu:hover{background:#eee;color:#333;}

  .overlay{position:fixed;inset:0;background:rgba(20,20,20,.42);display:none;align-items:center;justify-content:center;z-index:60;padding:16px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:10px;box-shadow:0 18px 48px rgba(0,0,0,.32);width:560px;max-width:100%;max-height:90vh;overflow:auto;}
  .modal.sm{width:340px;}
  .modal-b{padding:16px 18px 18px;}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:8px;}
  label.f{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:14px 0 5px;}
  input[type=text],input[type=number],select,textarea{width:100%;padding:9px;border:1px solid var(--line);border-radius:6px;font-size:14px;font-family:inherit;background:#fff;}
  input[type=color]{width:38px;height:32px;padding:0;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;vertical-align:middle;}
  textarea{min-height:70px;resize:vertical;}
  .radios{display:flex;flex-direction:column;gap:7px;font-size:14px;}
  .radios.row{flex-direction:row;gap:16px;}
  .radios label{display:flex;align-items:center;gap:7px;cursor:pointer;}
  .chk{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;}
  .modal-foot{display:flex;gap:8px;justify-content:flex-end;align-items:center;margin-top:20px;}
  .btn{padding:9px 14px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
  .btn.primary{background:var(--teal);color:#fff;} .btn.primary:hover{background:#187478;}
  .btn.ghost{background:none;color:var(--muted);} .btn.ghost:hover{color:#000;}
  .btn.sm{padding:6px 9px;font-size:12px;}
  table.grid{width:100%;border-collapse:collapse;font-size:13px;}
  table.grid td,table.grid th{padding:7px 6px;border-bottom:1px solid var(--line2);text-align:left;vertical-align:middle;}
  table.grid th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
  .info{background:#eefafa;border:1px solid #c7ebeb;border-radius:6px;padding:9px 11px;font-size:12.5px;color:#256;margin-bottom:12px;}
  .sum-ok{color:#2c8a52;font-weight:700;} .sum-bad{color:#c0442c;font-weight:700;}

  .tabs{display:flex;border-bottom:1px solid var(--line2);margin:6px 0 14px;}
  .tab{padding:8px 12px;font-size:12px;font-weight:700;letter-spacing:.03em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;}
  .tab.active{color:var(--ink);border-bottom-color:var(--teal);}
  .tab.disabled{opacity:.4;cursor:default;}
  .edit-grid{display:flex;gap:18px;}
  .edit-left{flex:0 0 150px;}
  .prev{position:relative;width:150px;height:200px;border:1.5px solid var(--line);background:#fff;}
  .prev .zone{cursor:pointer;}
  .prev .zone.sel{outline:2px solid #d0402a;outline-offset:-2px;z-index:2;}
  .prev .zone .zt{font-size:9px;}
  .change-tpl{margin-top:8px;font-size:12px;font-weight:700;color:var(--teal);cursor:pointer;letter-spacing:.03em;}
  .edit-right{flex:1;min-width:0;}
  .zone-meta{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .move-link{float:right;font-size:12px;font-weight:700;color:var(--teal);cursor:pointer;letter-spacing:.03em;}

  .tpl-lib{display:flex;flex-direction:column;gap:12px;}
  .tpl-row h4{margin:0 0 7px;font-size:12px;font-weight:700;color:#333;}
  .tpl-thumbs{display:flex;flex-wrap:wrap;gap:9px;align-items:flex-start;}
  .tpl-thumb{position:relative;width:56px;height:76px;border:1.5px solid var(--line);cursor:pointer;background:#fff;}
  .tpl-thumb:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(0,0,0,.15);}
  .tpl-thumb.cur{border-color:var(--teal);box-shadow:0 0 0 2px rgba(31,143,149,.3);}
  .more-link{font-size:11px;font-weight:700;color:var(--teal);cursor:pointer;align-self:center;padding:0 4px;}

  .hint{font-size:12px;color:var(--muted);padding:10px 16px 24px;}
  .menu{position:fixed;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:70;min-width:200px;padding:5px 0;font-size:13px;display:none;}
  .menu.show{display:block;}
  .menu .mi{padding:8px 14px;cursor:pointer;white-space:nowrap;}
  .menu .mi:hover{background:#f0f7f7;}
  .menu .mi.danger{color:#c0442c;}
  .menu .sep{height:1px;background:var(--line2);margin:4px 0;}
  .menu .lbl{padding:5px 14px 2px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}

  @media print{
    .topbar,.toolbar .cats,.toolbar .spacer,.hint,.overlay,.menu,.pagemenu{display:none !important;}
    .toolbar{border:0;} .board-wrap{overflow:visible;}
    .tile{box-shadow:none !important;transform:none !important;}
    @page{margin:12mm;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="brand">flatplan</span>
    <span class="issue-select"><select id="issueSelect" title="Switch issue"></select></span>
    <span class="badge-arch" id="archBadge" style="display:none">Archived</span>
    <span class="spacer"></span>
    <button class="tbtn" id="addPagesBtn">+ Pages</button>
    <button class="tbtn" id="setupBtn">Setup ▾</button>
    <button class="tbtn" id="manageBtn">Manage issues</button>
    <button class="tbtn primary" id="newIssueBtn">New flatplan</button>
  </div>
  <div class="toolbar">
    <h1 class="title" id="issueTitle">—</h1>
    <span class="spacer"></span>
    <div class="cats" id="catStats"></div>
    <div class="stat" id="pageStat"></div>
  </div>
  <div class="board-wrap"><div class="board" id="board"></div></div>
  <div class="hint">Click a page to change its template and add content per zone. Drag a page onto another to move/swap. Use ⋮ for insert / delete / lock, and <b>Setup</b> for categories, ad pool, sections, display &amp; PDF.</div>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="menu" id="ctxmenu"></div>

<script>
(function(){
  "use strict";
  const KEY="flatplan_v4";
  const lsGet=k=>{try{return window.localStorage.getItem(k)}catch(e){return null}};
  const lsSet=(k,v)=>{try{window.localStorage.setItem(k,v)}catch(e){}};
  let seq=0; const uid=p=>(p||"id")+"_"+(seq++)+"_"+Math.floor(Math.random()*1e6);

  /* ---------- template library (grouped, with common/more) ---------- */
  const Z=(x,y,w,h,label)=>({x,y,w,h,label});
  const TEMPLATES=[
    {id:"full",name:"Full page",group:"1 column",common:1,zones:[Z(0,0,1,1,"full")]},
    // vertical splits
    {id:"half-v",name:"1/2 + 1/2",group:"2 column",common:1,zones:[Z(0,0,.5,1,"1/2 vertical"),Z(.5,0,.5,1,"1/2 vertical")]},
    {id:"tt-third",name:"2/3 + 1/3",group:"2 column",common:1,zones:[Z(0,0,.667,1,"2/3 vertical"),Z(.667,0,.333,1,"1/3 vertical")]},
    {id:"third-tt",name:"1/3 + 2/3",group:"2 column",common:1,zones:[Z(0,0,.333,1,"1/3 vertical"),Z(.333,0,.667,1,"2/3 vertical")]},
    {id:"quarter-3q",name:"1/4 + 3/4",group:"2 column",zones:[Z(0,0,.25,1,"1/4 vertical"),Z(.25,0,.75,1,"3/4 vertical")]},
    {id:"3q-quarter",name:"3/4 + 1/4",group:"2 column",zones:[Z(0,0,.75,1,"3/4 vertical"),Z(.75,0,.25,1,"1/4 vertical")]},
    // horizontal splits
    {id:"half-h",name:"1/2 / 1/2",group:"2 row",common:1,zones:[Z(0,0,1,.5,"1/2 horizontal"),Z(0,.5,1,.5,"1/2 horizontal")]},
    {id:"tt-third-h",name:"2/3 / 1/3",group:"2 row",common:1,zones:[Z(0,0,1,.667,"2/3 horizontal"),Z(0,.667,1,.333,"1/3 horizontal")]},
    {id:"third-tt-h",name:"1/3 / 2/3",group:"2 row",zones:[Z(0,0,1,.333,"1/3 horizontal"),Z(0,.333,1,.667,"2/3 horizontal")]},
    {id:"thirds-h",name:"1/3 x3 rows",group:"2 row",zones:[Z(0,0,1,.333,"1/3 horizontal"),Z(0,.333,1,.334,"1/3 horizontal"),Z(0,.667,1,.333,"1/3 horizontal")]},
    // 3 zone
    {id:"thirds-v",name:"1/3 x3",group:"3 zone",common:1,zones:[Z(0,0,.333,1,"1/3 vertical"),Z(.333,0,.334,1,"1/3 vertical"),Z(.667,0,.333,1,"1/3 vertical")]},
    {id:"tt-sixths",name:"2/3 + 1/6 + 1/6",group:"3 zone",common:1,zones:[Z(0,0,.667,1,"2/3 vertical"),Z(.667,0,.333,.5,"1/6"),Z(.667,.5,.333,.5,"1/6")]},
    {id:"half-quarters",name:"1/2 + 1/4 + 1/4",group:"3 zone",common:1,zones:[Z(0,0,.5,1,"1/2 vertical"),Z(.5,0,.5,.5,"1/4 square"),Z(.5,.5,.5,.5,"1/4 square")]},
    {id:"quarters-half",name:"1/4 + 1/4 + 1/2",group:"3 zone",zones:[Z(0,0,.5,.5,"1/4 square"),Z(0,.5,.5,.5,"1/4 square"),Z(.5,0,.5,1,"1/2 vertical")]},
    {id:"half-h-halves",name:"1/2 / 1/4 + 1/4",group:"3 zone",zones:[Z(0,0,1,.5,"1/2 horizontal"),Z(0,.5,.5,.5,"1/4 square"),Z(.5,.5,.5,.5,"1/4 square")]},
    // 4 zone
    {id:"quarters",name:"1/4 x4",group:"4 zone",common:1,zones:[Z(0,0,.5,.5,"1/4 square"),Z(.5,0,.5,.5,"1/4 square"),Z(0,.5,.5,.5,"1/4 square"),Z(.5,.5,.5,.5,"1/4 square")]},
    {id:"quarters-v",name:"1/4 x4 cols",group:"4 zone",zones:[Z(0,0,.25,1,"1/4 vertical"),Z(.25,0,.25,1,"1/4 vertical"),Z(.5,0,.25,1,"1/4 vertical"),Z(.75,0,.25,1,"1/4 vertical")]},
    {id:"quarters-h",name:"1/4 x4 rows",group:"4 zone",zones:[Z(0,0,1,.25,"1/4 horizontal"),Z(0,.25,1,.25,"1/4 horizontal"),Z(0,.5,1,.25,"1/4 horizontal"),Z(0,.75,1,.25,"1/4 horizontal")]},
    // 6 zone
    {id:"sixths",name:"1/6 x6",group:"6 zone",zones:[Z(0,0,.333,.5,"1/6"),Z(.333,0,.334,.5,"1/6"),Z(.667,0,.333,.5,"1/6"),Z(0,.5,.333,.5,"1/6"),Z(.333,.5,.334,.5,"1/6"),Z(.667,.5,.333,.5,"1/6")]}
  ];
  const tplById=id=>TEMPLATES.find(t=>t.id===id)||TEMPLATES[0];

  /* ---------- zones from template ---------- */
  function makeZones(tplId,carry){
    return tplById(tplId).zones.map((z,i)=>({
      id:uid("z"),label:z.label,
      content:(carry&&carry[i]?carry[i].content:"")||"",
      advert:(carry&&carry[i]?!!carry[i].advert:false),
      category:(carry&&carry[i]?carry[i].category:"")||"",
      placed:(carry&&carry[i]?carry[i].placed:"")||""
    }));
  }
  function makePages(n,tplId){
    tplId=tplId||"full";
    const mk=(label,kind)=>({id:uid("p"),label,kind,locked:false,notes:"",templateId:tplId,zones:makeZones(tplId)});
    const pages=[mk("Cover","cover"),mk("IFC","ifc")];
    for(let i=1;i<=n;i++)pages.push(mk(String(i),"page"));
    pages.push(mk("IBC","ibc"),mk("Back","back"));
    return pages;
  }
  const isSpecial=k=>k==="cover"||k==="ifc"||k==="ibc"||k==="back";

  /* ---------- seed ---------- */
  function defaultCats(){return [
    {id:"progress",name:"In progress",color:"#e8a43c"},
    {id:"approved",name:"Approved",color:"#3f86c6"},
    {id:"final",name:"Final",color:"#3ba36b"}];}
  function seed(){
    const now=Date.now();
    const cur={id:uid("iss"),title:"Dance Magazine — July/August 2026",orientation:"portrait",singlePages:false,archived:false,createdAt:now,pages:makePages(12),
      sections:[{id:uid("s"),label:"Cover",pages:4},{id:uid("s"),label:"Section 1",pages:12}]};
    const byLabel=l=>cur.pages.find(p=>p.label===l);
    const setTpl=(p,tpl)=>{p.templateId=tpl;p.zones=makeZones(tpl);};
    const fill=(label,tpl,zd)=>{const p=byLabel(label);if(!p)return;if(tpl)setTpl(p,tpl);zd.forEach((d,i)=>{if(p.zones[i])Object.assign(p.zones[i],d);});};
    fill("Cover",null,[{content:"Cover image",category:"final"}]);
    fill("IFC",null,[{content:"Allegro Dancewear",advert:true,category:"approved"}]);
    fill("1",null,[{content:"Table of Contents",category:"approved"}]);
    fill("2",null,[{content:"Pointe Perfect",advert:true,category:"final"}]);
    fill("3",null,[{content:"Editor's Letter",category:"progress"}]);
    fill("4",null,[{content:"Center Stage Co.",advert:true,category:"approved"}]);
    fill("5","tt-third",[{content:"Feature: Summer Intensives",category:"progress"},{content:"Grand Jeté",advert:true,category:"approved"}]);
    fill("6",null,[{content:"Feature continued",category:"progress"}]);
    fill("7","half-h",[{content:"Review",category:"progress"},{content:"Motif Dance",advert:true,category:"final"}]);
    fill("8","tt-sixths",[{content:"Calendar",category:"progress"},{content:"Studio A",advert:true},{content:"Studio B",advert:true}]);
    fill("9",null,[{content:"Rhythm & Form",advert:true,category:"final"}]);
    fill("10","half-quarters",[{content:"Classifieds",category:"progress"},{content:"Barre Co.",advert:true},{content:"Turnout",advert:true}]);
    fill("11",null,[{content:"Feature: Careers",category:"progress"}]);
    fill("12",null,[{content:"Prima Collective",advert:true,category:"approved"}]);
    fill("IBC",null,[{content:"Nova Dance Co.",advert:true,category:"final"}]);
    fill("Back",null,[{content:"Legato Brands",advert:true,category:"final"}]);

    const past={id:uid("iss"),title:"Dance Magazine — May/June 2026",orientation:"portrait",singlePages:false,archived:true,createdAt:now-6e9,pages:makePages(12),sections:[]};
    past.pages.filter(p=>p.kind==="page").forEach((p,i)=>{
      if(i%3===0){p.zones[0].content="Advertiser "+(i+1);p.zones[0].advert=true;p.zones[0].category="final";}
      else{p.zones[0].content="Editorial";p.zones[0].category="final";}});

    return {activeIssueId:cur.id,issues:{[cur.id]:cur,[past.id]:past},
      categories:defaultCats(),
      pool:[{id:uid("a"),text:"Prospective: Mirella",suggested:"middle",size:"Full Page",shape:"Portrait",placed:false},
            {id:uid("a"),text:"Renewal: So Danca",suggested:"back third",size:"1/2",shape:"Landscape",placed:false}],
      display:{thumbs:true,overlays:false,tileSize:"m"}};
  }

  /* ---------- state ---------- */
  let state;
  function normalize(s){
    if(!s.categories)s.categories=defaultCats();
    if(!s.pool)s.pool=[];
    if(!s.display)s.display={thumbs:true,overlays:false,tileSize:"m"};
    Object.values(s.issues).forEach(i=>{if(!i.sections)i.sections=[];i.pages.forEach(p=>p.zones.forEach(z=>{if(z.placed===undefined)z.placed="";}));});
    return s;
  }
  function load(){const raw=lsGet(KEY);if(raw){try{const s=JSON.parse(raw);if(s&&s.issues&&s.activeIssueId){state=normalize(s);return;}}catch(e){}}state=seed();save();}
  function save(){lsSet(KEY,JSON.stringify(state));}
  const activeIssue=()=>state.issues[state.activeIssueId];
  const cats=()=>state.categories;
  const catById=id=>state.categories.find(c=>c.id===id);
  const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  const board=document.getElementById("board");
  const overlay=document.getElementById("overlay");
  const modal=document.getElementById("modal");
  const ctxmenu=document.getElementById("ctxmenu");

  /* ---------- paint zones ---------- */
  function paintZones(host,page,opts){
    opts=opts||{};
    const t=tplById(page.templateId);
    page.zones.forEach((zone,i)=>{
      const g=t.zones[i]||t.zones[0];
      const el=document.createElement("div");
      el.className="zone"+(zone.advert?" advert":"")+(zone.category?" catbar":"");
      el.style.left=(g.x*100)+"%";el.style.top=(g.y*100)+"%";el.style.width=(g.w*100)+"%";el.style.height=(g.h*100)+"%";
      if(zone.category){const c=catById(zone.category);if(c)el.style.borderLeftColor=c.color;}
      const showText=opts.forceText||state.display.thumbs;
      if(showText&&zone.content)el.innerHTML='<span class="zt">'+esc(zone.content)+'</span>';
      if(opts.selectable){el.dataset.zi=i;if(opts.selectedIndex===i)el.classList.add("sel");el.addEventListener("click",e=>{e.stopPropagation();opts.onSelect(i);});}
      host.appendChild(el);
    });
  }

  /* ---------- board ---------- */
  function pageTile(page){
    const el=document.createElement("div");
    el.className="tile"+(isSpecial(page.kind)?" special":"")+(page.locked?" locked":"");
    el.dataset.pid=page.id; el.draggable=!page.locked;
    paintZones(el,page,{});
    if(page.locked){const l=document.createElement("div");l.className="lockicon";l.textContent="🔒";el.appendChild(l);}
    if(page.notes){const n=document.createElement("div");n.className="noteicon";n.textContent="📝";el.appendChild(n);}
    if(state.display.overlays){const ads=page.zones.filter(z=>z.advert).length;if(ads){const bd=document.createElement("div");bd.className="overlay-badge";bd.textContent=ads+" ad"+(ads>1?"s":"");el.appendChild(bd);}}
    const menu=document.createElement("div");menu.className="pagemenu";menu.textContent="⋮";
    menu.addEventListener("click",e=>{e.stopPropagation();openPageMenu(page.id,e.clientX,e.clientY);});
    el.appendChild(menu);
    el.addEventListener("click",()=>{if(!page.locked)openEdit(page.id);});
    el.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",page.id);e.dataTransfer.effectAllowed="move";el.classList.add("dragging");});
    el.addEventListener("dragend",()=>el.classList.remove("dragging"));

    el.addEventListener("dragleave",()=>el.classList.remove("dragover"));

  function pageColumn(page){

  function applyTileSize(){

  function render(){

      .map(i=>'<option value="'+i.id+'"'+(i.id===iss.id?" selected":"")+'>'+esc(i.title)+(i.archived?" (archived)":"")+'</option>').join("");

  function layoutUnits(iss){
    if(iss.singlePages)return iss.pages.map(p=>[p]);
    const units=[],mid=[];
    iss.pages.forEach(p=>{if(p.kind!=="cover"&&p.kind!=="back")mid.push(p);});
    const cover=iss.pages.find(p=>p.kind==="cover"),back=iss.pages.find(p=>p.kind==="back");
    if(cover)units.push([cover]);
    for(let i=0;i<mid.length;i+=2)units.push(mid.slice(i,i+2));
    if(back)units.push([back]);
    return units;
  }
  function renderStats(iss){
    const counts={};let advertPages=0;
    iss.pages.forEach(p=>{const cs=new Set();let ad=false;p.zones.forEach(z=>{if(z.category)cs.add(z.category);if(z.advert)ad=true;});cs.forEach(c=>counts[c]=(counts[c]||0)+1);if(ad)advertPages++;});
    document.getElementById("catStats").innerHTML=cats().map(c=>'<span class="c"><span class="dotc" style="background:'+c.color+'"></span>'+esc(c.name)+' <b>'+(counts[c.id]||0)+'</b></span>').join("");
    document.getElementById("pageStat").innerHTML='<b>'+iss.pages.length+'</b> pages · <b>'+advertPages+'</b> with ads';
  }

  }

          unplaced.map(a=>'<option value="'+a.id+'"'+(zone.placed===a.id?" selected":"")+'>'+esc(a.text)+' ('+esc(a.size)+')</option>').join("")+'</select>';

    repaint();
    document.getElementById("changeTpl").onclick=()=>{persistZoneInputs(p);edit.tplOpen=!edit.tplOpen;renderEdit();};
    if(edit.tplOpen){wireTplLib(p);}
    else{
      const ci=document.getElementById("contentInput");

      const ps=document.getElementById("poolSel");

        const a=state.pool.find(x=>x.id===e.target.value);if(a){a.placed=true;zone.placed=a.id;zone.content=a.text;}else{zone.placed="";zone.content="";}repaint();};

  function persistZoneInputs(p){const zone=p.zones[edit.zi];if(!zone)return;const ci=document.getElementById("contentInput");const cs=document.getElementById("catSel");if(ci&&!zone.advert)zone.content=ci.value;if(cs)zone.category=cs.value;}
  function wireEditCommon(p){
    modal.querySelectorAll(".tab:not(.disabled)").forEach(t=>t.onclick=()=>{persistZoneInputs(p);edit.tab=t.dataset.tab;edit.tplOpen=false;renderEdit();});

  function renderTplLib(curId){
    const groups={};TEMPLATES.forEach(t=>{(groups[t.group]=groups[t.group]||[]).push(t);});
    let h='<div class="zone-meta">Pick a layout — replaces this page\'s zone structure</div><div class="tpl-lib">';
    Object.keys(groups).forEach(g=>{
      const all=groups[g];const exp=edit.expanded[g];const shown=exp?all:all.filter((t,i)=>t.common||i<4);
      h+='<div class="tpl-row"><h4>'+esc(g)+'</h4><div class="tpl-thumbs">';

      if(!exp&&all.length>shown.length)h+='<span class="more-link" data-more="'+esc(g)+'">MORE…</span>';
      h+='</div></div>';
    });
    return h+'</div>';
  }
  function wireTplLib(p){

    modal.innerHTML='<div class="modal-b"><div class="modal-title">Sections</div><div class="info">A print-run calculator: define your paper signatures (even-sized) and check they total your actual page count. Sections don’t change your pages.</div>'
      +'<table class="grid"><thead><tr><th>Section</th><th>Pages</th><th></th></tr></thead><tbody id="secRows">'+rows+'</tbody></table>'
      +'<button class="btn sm ghost" id="addSec" style="margin-top:10px;">+ Add section</button>'
      +'<div id="secSum" style="margin-top:14px;font-size:13px;"></div>'
      +'<div class="modal-foot"><button class="btn ghost" data-close>Cancel</button><button class="btn primary" id="saveSecs">Save</button></div></div>';
    modal.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeModal);
    const recompute=()=>{let s=0;modal.querySelectorAll("#secRows .spages").forEach(i=>s+=(+i.value||0));const el=document.getElementById("secSum");const ok=s===actual;el.innerHTML='Sections total <b>'+s+'</b> · flatplan has <b>'+actual+'</b> pages — <span class="'+(ok?"sum-ok":"sum-bad")+'">'+(ok?"balanced ✓":(s>actual?(s-actual)+" over":(actual-s)+" short"))+'</span>';};
    const wireRow=tr=>{tr.querySelector(".sdel").onclick=()=>{tr.remove();recompute();};tr.querySelector(".spages").oninput=recompute;};
    modal.querySelectorAll("#secRows tr").forEach(wireRow);
    document.getElementById("addSec").onclick=()=>{const tb=document.getElementById("secRows");const tr=document.createElement("tr");tr.dataset.sid=uid("s");tr.innerHTML='<td><input type="text" class="slabel" value="Section"></td><td><input type="number" class="spages" min="0" step="2" value="16" style="width:90px"></td><td style="text-align:right;"><button class="btn sm ghost sdel">Delete</button></td>';tb.appendChild(tr);wireRow(tr);recompute();};
    document.getElementById("saveSecs").onclick=()=>{const next=[];modal.querySelectorAll("#secRows tr").forEach(tr=>next.push({id:tr.dataset.sid,label:tr.querySelector(".slabel").value.trim(),pages:+tr.querySelector(".spages").value||0}));iss.sections=next;save();closeModal();};
    recompute();showModal();
  }

  /* ---------- Display settings ---------- */
  function openDisplay(){
    modal.className="modal sm";const d=state.display;
    modal.innerHTML='<div class="modal-b"><div class="modal-title">Display settings</div>'
      +'<label class="chk" style="margin-top:6px;"><input type="checkbox" id="dThumbs" '+(d.thumbs?"checked":"")+'> Show content text in tiles</label>'
      +'<label class="chk" style="margin-top:10px;"><input type="checkbox" id="dOver" '+(d.overlays?"checked":"")+'> Show ad-count overlay on tiles</label>'
      +'<label class="f">Tile size</label><div class="radios row"><label><input type="radio" name="tsz" value="s" '+(d.tileSize==="s"?"checked":"")+'>Small</label><label><input type="radio" name="tsz" value="m" '+(d.tileSize==="m"?"checked":"")+'>Medium</label><label><input type="radio" name="tsz" value="l" '+(d.tileSize==="l"?"checked":"")+'>Large</label></div>'
      +'<div class="modal-foot"><button class="btn ghost" data-close>Cancel</button><button class="btn primary" id="saveDisp">Apply</button></div></div>';
    modal.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeModal);
    document.getElementById("saveDisp").onclick=()=>{d.thumbs=document.getElementById("dThumbs").checked;d.overlays=document.getElementById("dOver").checked;d.tileSize=modal.querySelector('input[name=tsz]:checked').value;save();closeModal();render();};
    showModal();
  }

  /* ---------- misc ---------- */
  document.getElementById("issueSelect").onchange=e=>{state.activeIssueId=e.target.value;save();render();};
  function showModal(){overlay.classList.add("show");}
  function closeModal(){overlay.classList.remove("show");modal.innerHTML="";}
  overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
  document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal();ctxmenu.classList.remove("show");}});
  document.addEventListener("click",e=>{if(!ctxmenu.contains(e.target)&&e.target.id!=="setupBtn")ctxmenu.classList.remove("show");});

  try{load();}catch(e){state=seed();}
  render();
  window.__flatplan={state:()=>state,activeIssue,render};
})();
</script>
</body>
</html>
